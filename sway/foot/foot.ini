[main]
term=st-256color
dpi-aware=no
font=:size=20

pad=55x55

initial-window-size-chars=80x24

bold-text-in-bright=no

[cursor]
style=block
blink=yes
blink-rate=800
beam-thickness=2
underline-thickness=2

[colors-dark]
foreground=f2e3f7
background=221e24
alpha=0.50

regular0=221e24
regular1=9466a3
regular2=f39b68
regular3=ffc29e
regular4=a77cb6
regular5=f39b68
regular6=ba95c6
regular7=9f95a3

bright0=645a68
bright1=f8aa7c
bright2=302a32
bright3=574e5a
bright4=716774
bright5=dfcbe6
bright6=ec8d55
bright7=f2e3f7

[mouse]
hide-when-typing=yes

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
